<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Behemoth Tournament</title>

<style>
body {
    margin:0;
    background:#000;
    color:white;
    font-family:Arial;
}

header {
    text-align:center;
    padding:40px;
    border-bottom:2px solid gold;
    background: radial-gradient(circle, #111, #000);
}

h1 {
    color:gold;
    text-shadow:0 0 10px gold;
    letter-spacing:4px;
}

.section {
    padding:50px;
    text-align:center;
}

.card {
    background:#0d0d0d;
    border:1px solid gold;
    padding:20px;
    margin:20px auto;
    width:80%;
    border-radius:15px;
    transition:0.3s;
}

.card:hover {
    box-shadow:0 0 20px gold;
    transform:scale(1.02);
}

button {
    background:gold;
    padding:10px 20px;
    border:none;
    cursor:pointer;
}

button:hover {
    background:orange;
}

input {
    padding:10px;
    margin:10px;
    width:80%;
    background:black;
    border:1px solid gold;
    color:white;
}
</style>

</head>

<body>

<header>
    <h1>BEHEMOTH</h1>
    <p>Arène officielle de duel</p>
</header>

<div class="section">
    <h2>Bienvenue</h2>
    <p>Entre dans l’arène et domine le tournoi.</p>
</div>

<div class="section">
    <h2>Tournois</h2>
    <div class="card">
        <h3>Tournoi #1</h3>
        <p>Date : 25 Mars</p>
        <button>Rejoindre</button>
    </div>
</div>

<div class="section">
    <h2>Inscription</h2>
    <div class="card">
        <input placeholder="Nom"><br>
        <input placeholder="Deck"><br>
        <input placeholder="Email"><br>
        <button>Envoyer</button>
    </div>
</div>

<div class="section">
    <h2>Classement</h2>
    <div class="card">
        <p>🥇 Joueur1</p>
        <p>🥈 Joueur2</p>
        <p>🥉 Joueur3</p>
    </div>
</div>

<div class="section">
    <h2>Règlement</h2>
    <div class="card">
        <p>- Format officiel Yu-Gi-Oh</p>
        <p>- Fair play obligatoire</p>
    </div>
</div>

</body>
</html>
